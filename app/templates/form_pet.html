{% extends 'base.html' %}
{% block title %}{% if pet %}Editar{% else %}Novo{% endif %} Pet{% endblock %}
{% block content %}
<div class="d-flex align-items-center mb-4 gap-2">
  <a href="/pets" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i></a>
  <h2 class="mb-0">{% if pet %}Editar Pet{% else %}Novo Pet{% endif %}</h2>
</div>
<div class="card shadow-sm" style="max-width:520px">
  <div class="card-body">
    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold">Nome do Pet *</label>
        <input type="text" name="nome" class="form-control" required value="{{ pet.nome if pet else '' }}">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Tipo</label>
        <select name="tipo" class="form-select">
          {% for t in ['Cachorro','Gato','Pássaro','Coelho','Hamster','Outro'] %}
            <option {% if pet and pet.tipo==t %}selected{% endif %}>{{ t }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Raça</label>
        <input type="text" name="raca" class="form-control" value="{{ pet.raca if pet else '' }}">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Idade (anos)</label>
        <input type="number" name="idade" class="form-control" min="0" max="30" value="{{ pet.idade if pet else '' }}">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Tutor (Cliente) *</label>
        <select name="cliente_id" class="form-select" required>
          {% for c in clientes %}
            <option value="{{ c.id }}" {% if pet and pet.cliente_id==c.id %}selected{% endif %}>{{ c.nome }}</option>
          {% endfor %}
        </select>
      </div>
      <button type="submit" class="btn btn-pv w-100">
        <i class="bi bi-check-circle me-1"></i>{% if pet %}Salvar{% else %}Cadastrar{% endif %}
      </button>
    </form>
  </div>
</div>
{% endblock %}
