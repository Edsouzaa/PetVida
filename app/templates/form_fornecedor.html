{% extends 'base.html' %}
{% block title %}Novo Fornecedor{% endblock %}
{% block content %}
<div class="d-flex align-items-center mb-4 gap-2">
  <a href="/fornecedores" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i></a>
  <h2 class="mb-0">Novo Fornecedor</h2>
</div>
<div class="card shadow-sm" style="max-width:520px">
  <div class="card-body">
    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold">Nome *</label>
        <input type="text" name="nome" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Telefone</label>
        <input type="text" name="telefone" class="form-control">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">E-mail</label>
        <input type="email" name="email" class="form-control">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Produtos Representados</label>
        <textarea name="produtos_representados" class="form-control" rows="2"
                  placeholder="Ex: Rações, Medicamentos..."></textarea>
      </div>
      <button type="submit" class="btn btn-pv w-100"><i class="bi bi-check-circle me-1"></i>Cadastrar</button>
    </form>
  </div>
</div>
{% endblock %}
