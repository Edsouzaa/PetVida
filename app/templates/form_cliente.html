{% extends 'base.html' %}
{% block title %}{% if cliente %}Editar{% else %}Novo{% endif %} Cliente{% endblock %}
{% block content %}
<div class="d-flex align-items-center mb-4 gap-2">
  <a href="/clientes" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i></a>
  <h2 class="mb-0">{% if cliente %}Editar Cliente{% else %}Novo Cliente{% endif %}</h2>
</div>
<div class="card shadow-sm" style="max-width:520px">
  <div class="card-body">
    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold">Nome *</label>
        <input type="text" name="nome" class="form-control" required value="{{ cliente.nome if cliente else '' }}">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Telefone</label>
        <input type="text" name="telefone" class="form-control" value="{{ cliente.telefone if cliente else '' }}">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">E-mail</label>
        <input type="email" name="email" class="form-control" value="{{ cliente.email if cliente else '' }}">
      </div>
      <button type="submit" class="btn btn-pv w-100">
        <i class="bi bi-check-circle me-1"></i>{% if cliente %}Salvar{% else %}Cadastrar{% endif %}
      </button>
    </form>
  </div>
</div>
{% endblock %}
