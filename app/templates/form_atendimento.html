{% extends 'base.html' %}
{% block title %}Novo Atendimento{% endblock %}
{% block content %}
<div class="d-flex align-items-center mb-4 gap-2">
  <a href="/atendimentos" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i></a>
  <h2 class="mb-0">Registrar Atendimento</h2>
</div>
<div class="card shadow-sm" style="max-width:520px">
  <div class="card-body">
    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold">Pet *</label>
        <select name="pet_id" class="form-select" required>
          {% for p in pets %}
            <option value="{{ p.id }}">{{ p.nome }} ({{ p.nome_cliente }})</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Tipo de Serviço *</label>
        <select name="tipo_servico" class="form-select" required>
          <option>Banho</option>
          <option>Tosa</option>
          <option>Banho e Tosa</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Data *</label>
        <input type="date" name="data" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Valor (R$)</label>
        <input type="number" name="valor" class="form-control" min="0" step="0.01">
      </div>
      <button type="submit" class="btn btn-pv w-100"><i class="bi bi-check-circle me-1"></i>Registrar</button>
    </form>
  </div>
</div>
{% endblock %}
