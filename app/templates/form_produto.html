{% extends 'base.html' %}
{% block title %}{% if produto %}Editar{% else %}Novo{% endif %} Produto{% endblock %}
{% block content %}
<div class="d-flex align-items-center mb-4 gap-2">
  <a href="/produtos" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i></a>
  <h2 class="mb-0">{% if produto %}Editar Produto{% else %}Novo Produto{% endif %}</h2>
</div>
<div class="card shadow-sm" style="max-width:520px">
  <div class="card-body">
    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold">Nome *</label>
        <input type="text" name="nome" class="form-control" required value="{{ produto.nome if produto else '' }}">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Descrição</label>
        <textarea name="descricao" class="form-control" rows="2">{{ produto.descricao if produto else '' }}</textarea>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Preço (R$) *</label>
        <input type="number" name="preco" class="form-control" min="0" step="0.01" required
               value="{{ produto.preco if produto else '' }}">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Qtd. em Estoque</label>
        <input type="number" name="quantidade_estoque" class="form-control" min="0"
               value="{{ produto.quantidade_estoque if produto else 0 }}">
      </div>
      <button type="submit" class="btn btn-pv w-100">
        <i class="bi bi-check-circle me-1"></i>{% if produto %}Salvar{% else %}Cadastrar{% endif %}
      </button>
    </form>
  </div>
</div>
{% endblock %}
