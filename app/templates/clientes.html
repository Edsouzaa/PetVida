{% extends 'base.html' %}
{% block title %}Clientes{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2><i class="bi bi-people me-2"></i>Clientes</h2>
  <a href="/clientes/novo" class="btn btn-pv"><i class="bi bi-person-plus me-1"></i>Novo Cliente</a>
</div>
<div class="card shadow-sm">
  <div class="card-body p-0">
    <table class="table table-hover mb-0">
      <thead><tr><th>#</th><th>Nome</th><th>Telefone</th><th>E-mail</th><th>Ações</th></tr></thead>
      <tbody>
      {% for c in clientes %}
        <tr>
          <td>{{ c.id }}</td><td>{{ c.nome }}</td><td>{{ c.telefone }}</td><td>{{ c.email }}</td>
          <td>
            <a href="/clientes/editar/{{ c.id }}" class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i></a>
            <a href="/clientes/excluir/{{ c.id }}" class="btn btn-sm btn-outline-danger"
               onclick="return confirm('Excluir cliente?')"><i class="bi bi-trash"></i></a>
          </td>
        </tr>
      {% else %}
        <tr><td colspan="5" class="text-center text-muted py-4">Nenhum cliente cadastrado.</td></tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
